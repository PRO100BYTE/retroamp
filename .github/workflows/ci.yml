name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Job 1: Frontend smoke-test (fast, Linux) ──────────────────────────────
  frontend-test:
    name: "① Frontend Build & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: "TEST: Build frontend"
        run: npm run build:web

      - name: "TEST: Verify build/frontend output"
        run: |
          test -d build/frontend            || (echo "❌ build/frontend missing"      && exit 1)
          test -f build/frontend/index.html || (echo "❌ build/frontend/index.html missing" && exit 1)
          test -d build/frontend/assets     || (echo "❌ build/frontend/assets missing" && exit 1)
          echo "✅ Frontend build artifacts OK"

  # ── Job 2: Full Tauri build on Windows + integrity check ─────────────────
  tauri-build:
    name: "② Full App Build (Windows)"
    runs-on: windows-latest
    needs: frontend-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-rust-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-rust-

      - name: Install dependencies
        run: npm ci

      - name: Clean previous build
        run: |
          if (Test-Path build)     { Remove-Item -Recurse -Force build }
          if (Test-Path dist)      { Remove-Item -Recurse -Force dist }

      - name: "BUILD: Compile app"
        run: npm run build

      - name: "TEST: Verify app executable"
        run: |
          $exe = "src-tauri/target/release/app.exe"
          $msi = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          $nsis = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1

          if (-not (Test-Path $exe))       { Write-Error "❌ app.exe not found"; exit 1 }
          if (-not $msi)                   { Write-Error "❌ MSI installer not found"; exit 1 }
          if (-not $nsis)                  { Write-Error "❌ NSIS installer not found"; exit 1 }

          $exeSize  = (Get-Item $exe).length
          $msiSize  = (Get-Item $msi.FullName).length
          $nsisSize = (Get-Item $nsis.FullName).length

          if ($exeSize  -lt 1MB) { Write-Error "❌ app.exe too small ($exeSize bytes)"; exit 1 }
          if ($msiSize  -lt 1MB) { Write-Error "❌ MSI too small ($msiSize bytes)"; exit 1 }
          if ($nsisSize -lt 1MB) { Write-Error "❌ NSIS too small ($nsisSize bytes)"; exit 1 }

          Write-Host "✅ app.exe  : $([math]::Round($exeSize/1MB, 2)) MB"
          Write-Host "✅ MSI      : $([math]::Round($msiSize/1MB, 2)) MB — $($msi.Name)"
          Write-Host "✅ Installer: $([math]::Round($nsisSize/1MB, 2)) MB — $($nsis.Name)"
